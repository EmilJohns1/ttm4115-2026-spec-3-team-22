syntax = "proto2";

message Status{
    required uint32 Date = 1;
    required uint32 Battery_level = 2;
    required double Latitude = 3;
    required double Longitude = 4;
    required double Speed = 5;
}

message TaskAssignment{
    required double Latitude = 1;
    required double Longitude = 2;
}

message AssignmentRequest{
    required double Latitude = 1;
    required double Longitude = 2;
}

message DroneHello{
    required string DroneID = 1;
    required uint32 Battery = 2;
}

message ArrivalConfirmation{
    optional uint32 DroneID = 1;
}

message DroneAssignment{
    required uint32 DroneID = 1;
}

message AssignmentFailed{
    required uint32 ErrCode = 1;
}